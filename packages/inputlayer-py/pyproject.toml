[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "inputlayer-client-dev"
version = "0.1.0"
description = "Python Object-Logic Mapper for InputLayer knowledge graph engine"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0,<3",
    "websockets>=12.0,<15",
]

[project.optional-dependencies]
pandas = ["pandas>=1.5"]
langchain = ["langchain-core>=0.3"]
langgraph = ["langgraph>=0.2", "langchain-core>=0.3"]
all = [
    "inputlayer-client-dev[pandas,langchain,langgraph]",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pandas>=1.5",
    "langchain-core>=0.3",
    "langchain-openai>=1.0",
    "langgraph>=0.2",
    "ruff>=0.8",
    "mypy>=1.13",
]

[project.scripts]
il = "inputlayer.migrations.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/inputlayer"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]

[tool.ruff.lint.per-file-ignores]
"examples/langchain/ex*.py" = ["F405", "F403", "E501"]
"examples/langgraph/ex*.py" = ["F405", "F403", "E501"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true
packages = ["inputlayer"]
mypy_path = "src"
