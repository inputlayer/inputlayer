name: Publish JS/TS SDK to npm

on:
  push:
    branches:
      - main
    paths:
      - 'packages/inputlayer-js/**'

  workflow_dispatch:

defaults:
  run:
    working-directory: packages/inputlayer-js

jobs:
  test:
    name: Test JS/TS SDK
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  publish:
    name: Publish to npm
    needs: test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Set dev version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          DEV_VERSION="${BASE_VERSION}-dev.${SHORT_SHA}"
          echo "Publishing version: ${DEV_VERSION}"
          npm version "$DEV_VERSION" --no-git-tag-version

      - name: Build package
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --tag dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
